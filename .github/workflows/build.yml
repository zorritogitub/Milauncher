name: Build y Release MiLauncher

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión para release'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Encontrar archivo .csproj
      id: find-csproj
      shell: pwsh
      run: |
        $csproj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if ($csproj) {
          Write-Host "Found csproj: $($csproj.FullName)"
          echo "csproj_path=$($csproj.FullName)" >> $env:GITHUB_OUTPUT
          echo "csproj_dir=$($csproj.DirectoryName)" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "No .csproj file found!"
          exit 1
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar paquetes
      run: dotnet restore "${{ steps.find-csproj.outputs.csproj_path }}"

    - name: Compilar y publicar
      run: dotnet publish "${{ steps.find-csproj.outputs.csproj_path }}" -c Release -o ./publish

    - name: Limpiar archivos no deseados
      shell: pwsh
      run: |
        # Eliminar archivos de Android/MAUI si existen
        Get-ChildItem ./publish -Filter *.cs | Remove-Item -Force -ErrorAction SilentlyContinue
        Get-ChildItem ./publish -Filter *.android.* | Remove-Item -Force -ErrorAction SilentlyContinue

    - name: Ver archivos compilados
      run: Get-ChildItem ./publish

    - name: Crear ZIP
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        if ([string]::IsNullOrEmpty($version)) {
          $version = "${{ github.ref_name }}"
        }
        if ([string]::IsNullOrEmpty($version)) {
          $version = "manual"
        }
        $version = $version -replace '[^\w\.-]', '_'
        Compress-Archive -Path ./publish/* -DestinationPath "./MiLauncher-$version.zip" -Force

    - name: Crear Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != ''
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: MiLauncher ${{ github.event.inputs.version || github.ref_name }}
        body: |
          # 🚀 MiLauncher ${{ github.event.inputs.version || github.ref_name }}
          
          ## ✨ Características:
          - Launcher estilo Blizzard con .NET 8
          - Interfaz moderna con sidebar
          - Ventana personalizada
          
          ## 📦 Archivos incluidos:
          - Ejecutable y dependencias
        files: |
          ./MiLauncher-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Subir artifact
      uses: actions/upload-artifact@v4
      with:
        name: MiLauncher-${{ github.sha }}
        path: ./publish/
