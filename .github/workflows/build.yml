name: Build y Release MiLauncher

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión para release'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar paquetes
      run: dotnet restore MiLauncher.csproj  # Cambiado: sin src/

    - name: Compilar
      run: dotnet publish MiLauncher.csproj -c Release -o ./publish  # Cambiado: sin src/

    - name: Eliminar archivos no necesarios
      shell: pwsh
      run: |
        # Eliminar archivos de Android/MAUI si existen
        if (Test-Path "./publish/MainActivity.cs") { Remove-Item "./publish/MainActivity.cs" }
        if (Test-Path "./publish/*.android.cs") { Remove-Item "./publish/*.android.cs" }

    - name: Ver archivos compilados
      run: Get-ChildItem ./publish -Recurse

    - name: Crear ZIP
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        if ([string]::IsNullOrEmpty($version)) {
          $version = "${{ github.ref_name }}"
        }
        if ([string]::IsNullOrEmpty($version)) {
          $version = "manual"
        }
        $version = $version -replace '[^\w\.-]', '_'
        Compress-Archive -Path ./publish/* -DestinationPath "./MiLauncher-$version.zip" -Force

    - name: Crear Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != ''
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: MiLauncher ${{ github.event.inputs.version || github.ref_name }}
        body: |
          # 🚀 MiLauncher ${{ github.event.inputs.version || github.ref_name }}
          
          ## 📦 Características:
          - Launcher estilo Blizzard con .NET 8 y WPF
          - Interfaz moderna con sidebar y grid de juegos
          - Ventana personalizada con sombras
          - Build automático con GitHub Actions
          
          ## 📥 Archivos:
          - `MiLauncher.exe` y dependencias
          - ZIP completo con todo incluido
          
          ## ⚙️ Detalles Técnicos:
          - **Target:** .NET 8.0-windows
          - **Commit:** ${{ github.sha }}
          - **Trigger:** ${{ github.event_name }}
        files: |
          ./MiLauncher-*.zip
          ./publish/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Subir artifact
      uses: actions/upload-artifact@v4
      with:
        name: MiLauncher-${{ github.sha }}
        path: ./publish/
